name: Cross-Platform Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}
    strategy:
      fail-fast: false
      matrix:
        config:
          - { name: "Windows-Latest", os: windows-latest }
          - { name: "Ubuntu-Latest",  os: ubuntu-latest }

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Linux needs specific system headers to build SDL3 from source
      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libasound2-dev libpulse-dev libaudio-dev \
            libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxi-dev \
            libxinerama-dev libxkbcommon-dev libxss-dev libgl1-mesa-dev libxcursor-dev libxinerama-dev libxi-dev libxrandr-dev \
            libxtst-dev

      # Ninja is pre-installed on GitHub runners, so we can go straight to Configure
      - name: Configure CMake
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build Project
        run: cmake --build build --config Release

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Chip8-${{ matrix.config.name }}
          # Path covers Linux binary and Windows .exe (including subfolders)
          path: |
            build/Chip8
            build/Chip8.exe
            build/Release/Chip8.exe
