name: Cross-Platform Build & Release

on:
  push:
    branches: [ "main", "master" ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}
    strategy:
      fail-fast: false
      matrix:
        config:
          - { name: "Windows-Latest", os: windows-latest, artifact: "Chip8-Windows.exe" }
          - { name: "Ubuntu-Latest",  os: ubuntu-latest,  artifact: "Chip8-Linux" }
          - { name: "macOS-Latest",   os: macos-latest,   artifact: "Chip8-macOS" } # Added macOS

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libasound2-dev libpulse-dev libaudio-dev \
            libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxi-dev \
            libxinerama-dev libxkbcommon-dev libxss-dev libgl1-mesa-dev libxtst-dev

      - name: Configure CMake
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build Project
        run: cmake --build build --config Release

      - name: Rename Binary
        shell: bash
        run: |
          if [ "${{ runner.os }}" == "Windows" ]; then
            [ -f build/Release/Chip8.exe ] && mv build/Release/Chip8.exe ./${{ matrix.config.artifact }} || mv build/Chip8.exe ./${{ matrix.config.artifact }}
          else
            mv build/Chip8 ./${{ matrix.config.artifact }}
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.config.artifact }}
          path: ${{ matrix.config.artifact }}

  publish:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/Chip8-Windows.exe
            release-assets/Chip8-Linux
            release-assets/Chip8-macOS
